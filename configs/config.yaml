model:
  modalities: ["face", "eeg", "ppg", "eda", "tmp"]

  encoders:
    face:
      emb_dim: 128

    eeg:
      emb_dim: 128

    ppg:
      emb_dim: 128

    eda:
      emb_dim: 128

    tmp:
      emb_dim: 128

  selector:
    type: contrastive
    top_k: 2
    temperature: 0.1

  fusion:
    type: directed_cross_attention

  graph_embedding:
    type: attention   # mean | sum | concat | attention

  task_head:
    type: multi_output

    outputs:
      valence:
        type: multiclass
        output_dim: 1

      arousal:
        type: multiclass
        output_dim: 1


loss:
  task: 1.0
  contrastive: 0.5
  graph: 0.5

training:
  batch_size: 36
  lr: 0.0001
  weight_decay: 0.01
  epochs: 50
  grad_clip: 5.0